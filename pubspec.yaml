name: midi_device_service
description: A production-grade Flutter plugin for real-time MIDI input via USB and Bluetooth Low Energy (BLE) on Android. Built on android.media.midi for minimal latency.
version: 1.0.0
homepage: https://github.com/pianopilot/midi_device_service

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

flutter:
  plugin:
    platforms:
      android:
        package: com.pianopilot.midi_device_service
        pluginClass: MidiDeviceServicePlugin

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
